# Hooks with the same priority will be run concurrently by `prek`.
#
# Priority 0 is read-only hooks, and hooks that modify disjoint file types.
# Priorities 0-2 includes some lint-autofix hooks, so various read-only lint
# hooks are included in priority >=2 to ensure they don't report lint
# violations that have already been fixed by earlier hooks.

repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
        priority: 0
  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a # frozen: v2.4.2
    hooks:
      - id: codespell
        language: python # means renovate will update the `additional_dependencies` for the hook
        additional_dependencies: ["tomli==2.4.1"]
        priority: 0
  - repo: https://github.com/abravalheri/validate-pyproject
    rev: 4b2e70d08cb2ccd26d1fba73588de41c7a5d50b7 # frozen: v0.25
    hooks:
      - id: validate-pyproject
        priority: 0
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 6b63472e72e1a91ed8a2f6d483790dfb644fa1d3 # frozen: 0.37.4
    hooks:
      - id: check-github-workflows
        priority: 0
  # `actionlint` hook, for verifying correct syntax in GitHub Actions workflows.
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # frozen: v1.7.12
    hooks:
      - id: actionlint
        additional_dependencies:
          # actionlint has a shellcheck integration which extracts shell scripts in `run:` steps from GitHub Actions
          # and checks these with shellcheck. This is arguably its most useful feature,
          # but the integration only works if shellcheck is installed.
          #
          # NOTE: if this is pinned to an exact hash, renovate won't update it as of 2026-07-06;
          # it will only update the version if the tag is understood as a valid Go version.
          # Pinning to an exact hash is also less important for a go dependency anyway;
          # Go has better protections against mutable tags than the Python ecosystem, for example:
          # https://go.dev/blog/supply-chain
          - "github.com/wasilibs/go-shellcheck/cmd/shellcheck@v0.11.1"
        language: golang # means renovate will also update `additional_dependencies`
        priority: 0
  # zizmor detects security vulnerabilities in GitHub Actions workflows.
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: e3eebf65325ccc992422292cb7a4baee967cf815 # frozen: v1.26.1
    hooks:
      - id: zizmor
        priority: 0
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: check-yaml
        priority: 0
      - id: check-toml
        priority: 0
      - id: check-merge-conflict
        priority: 0
      - id: check-case-conflict
        priority: 0
      - id: end-of-file-fixer
        priority: 0
      - id: name-tests-test
        args: [--pytest-test-first]
        priority: 0
      - id: trailing-whitespace
        priority: 1
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: a4d5d37e66ebcd6b3705204a1d6dbb56dea66338 # frozen: v0.49.0
    hooks:
      - id: markdownlint
        priority: 0
      - id: markdownlint-fix
        priority: 2
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: 39e2973981e6d2f9b6c543b0086a2d2393abdc89 # frozen: v3.9.4
    hooks:
      - id: prettier
        exclude_types: ["markdown"]
        priority: 2
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 01a675ea018f2fb714478a5ffb83fcea8374bb06 # frozen: v0.15.21
    hooks:
      - id: ruff-check
        priority: 2
      - id: ruff-format
        priority: 3
  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: 7f8502eb16c9a4b600cfb7fb069ae1154e21fbf9 # frozen: v0.0.60
    hooks:
      - id: ty
        priority: 0
